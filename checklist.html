<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkbox Todo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 80px;
    }

    .todo-container {
      width: 400px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }

    .todo-item input[type="text"] {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      background: transparent;
    }

    .todo-item.completed input[type="text"] {
      text-decoration: line-through;
      color: gray;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="todo-container" id="todoContainer"></div>

<script>
  const container = document.getElementById("todoContainer");

  function createTodoItem(focus = false) {
    const div = document.createElement("div");
    div.className = "todo-item";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Write something...";

    // Enter → create new item
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const newItem = createTodoItem(true);
        container.insertBefore(newItem, div.nextSibling);
      }

      // Backspace on empty → delete current
      if (e.key === "Backspace" && input.value === "") {
        e.preventDefault();
        const prev = div.previousElementSibling;
        div.remove();
        if (prev) {
          prev.querySelector("input[type='text']").focus();
        }
      }
    });

    // Toggle complete
    checkbox.addEventListener("change", () => {
      div.classList.toggle("completed", checkbox.checked);
    });

    div.appendChild(checkbox);
    div.appendChild(input);

    if (focus) {
      setTimeout(() => input.focus(), 0);
    }

    return div;
  }

  // Initial item
  container.appendChild(createTodoItem(true));
</script>

</body>
</html>
